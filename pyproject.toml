[project]
name = "atlas_stream"
version = "0.0.1"
authors = [{ name = "dbbruijn@gmail.com" }]
requires-python = ">=3.10,<3.13"
dependencies = [
    # Any dependencies for jobs and pipelines in this project can be added here
    # See also https://docs.databricks.com/dev-tools/bundles/library-dependencies
    #
    # LIMITATION: for pipelines, dependencies are cached during development;
    # add dependencies to the 'environment' section of your pipeline.yml file instead
]

[dependency-groups]
dev = [
    "pytest",
    "ruff",
    "databricks-dlt",
    "databricks-connect>=15.4,<15.5",
    "ipykernel",
]

[project.scripts]
main = "atlas_stream.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
line-length = 120

[tool.ruff.lint]
# F821: DLT transformation files use runtime-injected globals (spark, dbutils, dlt)
# Notebooks also use these Databricks runtime globals
per-file-ignores = { "src/atlas_stream_etl/**" = ["F821"], "src/**/*.ipynb" = ["F821"] }
