# DLT pipeline for the atlas_stream country data ingestion.
# Transformation files under src/atlas_stream_etl/transformations/ are included via glob.

resources:
  pipelines:
    atlas_stream_etl:
      name: atlas_stream_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/atlas_stream_etl"

      # Expose source_api_url to transformation code via spark.conf.get("source_api_url")
      configuration:
        source_api_url: ${var.source_api_url}

      libraries:
        - glob:
            include: ../src/atlas_stream_etl/transformations/**

      environment:
        dependencies:
          # Pull in every dependency from pyproject.toml via the editable install
          # pointing at the deployed workspace file path.
          - --editable ${workspace.file_path}
