# The main pipeline for atlas_stream

resources:
  pipelines:
    atlas_stream_etl:
      name: atlas_stream_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/atlas_stream_etl"

      libraries:
        - glob:
            include: ../src/atlas_stream_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
