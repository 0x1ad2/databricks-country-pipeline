# Orchestration job for the atlas_stream ETL pipeline.
# Medallion architecture: bronze (append) → silver → gold → verify
# All tasks run serverless (no cluster key required).

resources:
  jobs:
    atlas_stream_job:
      name: atlas_stream_job

      tags:
        team: data-engineering
        domain: reference-data
        pipeline: atlas_stream

      trigger:
        # Run once a day; pause_status is overridden per target in databricks.yml.
        # In dev mode the bundle also pauses schedules automatically.
        periodic:
          interval: 1
          unit: DAYS
        pause_status: ${var.schedule_pause_status}

      email_notifications:
        on_failure:
          - ${var.notification_email}
        no_alert_for_skipped_runs: true

      # SLA guard: alert if the job is still running after 1 hour (normal ~5 min)
      health:
        rules:
          - metric: RUN_DURATION_SECONDS
            op: GREATER_THAN
            value: 3600

      # Job-level parameters — can be overridden at runtime via the UI or CLI.
      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: source_api_url
          default: ${var.source_api_url}

      # ------------------------------------------------------------------
      # Task 1: Fetch REST Countries API → bronze.countries_raw (append)
      # ------------------------------------------------------------------
      tasks:
        - task_key: ingest_countries_to_bronze
          python_wheel_task:
            package_name: atlas_stream
            entry_point: ingest_countries
            parameters:
              - "--catalog"
              - "{{job.parameters.catalog}}"
              - "--source-api-url"
              - "{{job.parameters.source_api_url}}"
          environment_key: default
          timeout_seconds: 300
          max_retries: 2
          min_retry_interval_millis: 60000
          retry_on_timeout: true

        # ------------------------------------------------------------------
        # Task 2: Parse latest bronze batch → silver.countries
        # ------------------------------------------------------------------
        - task_key: bronze_countries_to_silver
          depends_on:
            - task_key: ingest_countries_to_bronze
          python_wheel_task:
            package_name: atlas_stream
            entry_point: bronze_countries_to_silver
            parameters:
              - "--catalog"
              - "{{job.parameters.catalog}}"
          environment_key: default
          timeout_seconds: 300
          max_retries: 1
          min_retry_interval_millis: 30000

        # ------------------------------------------------------------------
        # Task 3: Aggregate silver → 6 gold tables
        # ------------------------------------------------------------------
        - task_key: silver_countries_to_gold
          depends_on:
            - task_key: bronze_countries_to_silver
          python_wheel_task:
            package_name: atlas_stream
            entry_point: silver_countries_to_gold
            parameters:
              - "--catalog"
              - "{{job.parameters.catalog}}"
          environment_key: default
          timeout_seconds: 600
          max_retries: 1
          min_retry_interval_millis: 30000

        # ------------------------------------------------------------------
        # Task 4: Assert all 8 tables pass quality checks
        # ------------------------------------------------------------------
        - task_key: verify_country_tables
          depends_on:
            - task_key: silver_countries_to_gold
          python_wheel_task:
            package_name: atlas_stream
            entry_point: verify_country_tables
            parameters:
              - "--catalog"
              - "{{job.parameters.catalog}}"
          environment_key: default
          timeout_seconds: 300

      # Serverless environment: environment_version "2" enables serverless
      # compute — compatible with Databricks Free Edition.
      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              # The wheel built by "uv build --wheel" (see artifacts in databricks.yml)
              - ../dist/*.whl
