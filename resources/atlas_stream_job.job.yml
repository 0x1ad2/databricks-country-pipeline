# Orchestration job for the atlas_stream pipeline.
# Runs: notebook → python wheel → DLT pipeline refresh.

resources:
  jobs:
    atlas_stream_job:
      name: atlas_stream_job

      trigger:
        # Run once a day; pause status is controlled by the schedule_pause_status variable.
        # In dev mode the bundle also pauses this automatically.
        periodic:
          interval: 1
          unit: DAYS
        pause_status: ${var.schedule_pause_status}

      #email_notifications:
      #  on_failure:
      #    - your_email@example.com

      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: schema
          default: ${var.schema}
        - name: source_api_url
          default: ${var.source_api_url}

      tasks:
        - task_key: notebook_task
          notebook_task:
            notebook_path: ../src/sample_notebook.ipynb

        - task_key: python_wheel_task
          depends_on:
            - task_key: notebook_task
          python_wheel_task:
            package_name: atlas_stream
            entry_point: main
            parameters:
              - "--catalog"
              - "${var.catalog}"
              - "--schema"
              - "${var.schema}"
              - "--source-api-url"
              - "${var.source_api_url}"
          environment_key: default

        - task_key: refresh_pipeline
          depends_on:
            - task_key: notebook_task
          pipeline_task:
            pipeline_id: ${resources.pipelines.atlas_stream_etl.id}

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              # The .whl built by "uv build --wheel" — see artifacts in databricks.yml
              - ../dist/*.whl
