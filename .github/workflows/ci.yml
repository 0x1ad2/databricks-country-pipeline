# CI pipeline for atlas_stream — runs on every push and pull request.
# Validates: lint, pure-Python tests, wheel build, bundle validate.
# Spark integration tests are skipped in CI (no credentials).

name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/

      - name: Test (pure-Python only, no Spark)
        run: uv run pytest -v -m "not spark" --no-cov
        env:
          DATABRICKS_CONFIG_PROFILE: ci  # non-existent profile; Spark tests are skipped

      - name: Build wheel
        run: uv build --wheel

      - name: Validate bundle (dev target)
        uses: databricks/setup-cli@main

      - name: Bundle validate
        run: databricks bundle validate --target dev
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
