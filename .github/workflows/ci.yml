name: CI / Deploy

# Runs on every PR to master (CI only) and on every push to master (CI + deploy).
on:
    pull_request:
        branches:
            - master
    push:
        branches:
            - master

# Force all JS actions to run on Node 24 (Node 20 is deprecated from June 2026).
env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
    DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

jobs:
    # --------------------------------------------------------------------------
    # CI — always runs (PRs and pushes)
    # --------------------------------------------------------------------------
    ci:
        name: CI
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python 3.10
              uses: actions/setup-python@v5
              with:
                  python-version: "3.10"

            - name: Install uv
              run: pip install uv --quiet

            - name: Install Databricks CLI
              run: |
                  curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
                  databricks --version

            - name: Install dev dependencies
              run: uv sync --dev

            - name: Lint
              run: uv run ruff check src/ tests/

            - name: Build wheel
              run: uv build --wheel

            - name: Run tests
              if: hashFiles('tests/**/*.py') != ''
              run: uv run pytest tests/ -v

            - name: Validate bundle
              run: databricks bundle validate

            # Upload the wheel so the deploy job can reuse it without rebuilding.
            - name: Upload wheel artifact
              uses: actions/upload-artifact@v4
              with:
                  name: wheel
                  path: dist/*.whl
                  retention-days: 1

    # --------------------------------------------------------------------------
    # Deploy — only on push to master, after CI passes
    # --------------------------------------------------------------------------
    deploy:
        name: Deploy → prod
        runs-on: ubuntu-latest
        needs: ci
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python 3.10
              uses: actions/setup-python@v5
              with:
                  python-version: "3.10"

            - name: Install uv
              run: pip install uv --quiet

            - name: Install Databricks CLI
              run: |
                  curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
                  databricks --version

            - name: Download wheel artifact
              uses: actions/download-artifact@v4
              with:
                  name: wheel
                  path: dist/

            - name: Validate bundle (prod)
              run: databricks bundle validate --target prod

            - name: Deploy bundle (prod)
              run: databricks bundle deploy --target prod
            # Uncomment to trigger the ETL job immediately after deployment:
            # - name: Run ETL job
            #   run: databricks bundle run atlas_stream_job --target prod

