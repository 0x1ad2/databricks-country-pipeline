# Emergency / manual re-deploy workflow.
# Automatic deploys on push to master are handled by ci.yml (deploy job).
# Use this only when you need to force a prod deploy without a code push
# (e.g. config rollback, secret rotation).

name: Manual Deploy

on:
    workflow_dispatch:
        inputs:
            target:
                description: Bundle target to deploy
                required: true
                default: prod
                type: choice
                options:
                    - prod
                    - dev

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
    DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

jobs:
    deploy:
        name: Manual deploy → ${{ inputs.target }}
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python 3.10
              uses: actions/setup-python@v5
              with:
                  python-version: "3.10"

            - name: Install uv
              run: pip install uv --quiet

            - name: Install Databricks CLI
              run: |
                  curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
                  databricks --version

            - name: Build wheel
              run: uv build --wheel

            - name: Validate bundle
              run: databricks bundle validate --target ${{ inputs.target }}

            - name: Deploy bundle
              run: databricks bundle deploy --target ${{ inputs.target }}
