# Databricks Asset Bundle — atlas_stream country pipeline
# Docs: https://docs.databricks.com/dev-tools/bundles/index.html

bundle:
  name: atlas_stream
  uuid: 8d88bd58-94ac-4083-975d-c9ce7e6131ad

include:
  - resources/*.yml

# ---------------------------------------------------------------------------
# Artifact: Python wheel used by the python_wheel_task in the job
# ---------------------------------------------------------------------------
artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# ---------------------------------------------------------------------------
# Variables
# Defaults apply unless overridden per target or at deploy time with --var.
# ---------------------------------------------------------------------------
variables:
  catalog:
    description: Unity Catalog catalog name
    default: workspace

  schema:
    description: Unity Catalog schema name
    # No global default — each target sets its own value

  source_api_url:
    description: REST Countries API endpoint — must include ?fields= (v3.1 returns 400 without it)
    default: https://restcountries.com/v3.1/all?fields=name,cca2,cca3,region,subregion,population,area,landlocked,unMember,capital,continents,flags

  schedule_pause_status:
    description: Job trigger pause status — PAUSED or UNPAUSED
    default: UNPAUSED

# ---------------------------------------------------------------------------
# Targets
# Workspace host is resolved from the local ~/.databrickscfg profile.
# In CI, set DATABRICKS_HOST + DATABRICKS_TOKEN env vars instead of a profile.
# ---------------------------------------------------------------------------
targets:
  # -- Development (default) ------------------------------------------------
  # mode: development automatically:
  #   - prefixes all resource names with "[dev <username>]"
  #   - pauses all job schedules and triggers
  # Profile: configure "atlas_stream_dev" in ~/.databrickscfg
  #   databricks configure --profile atlas_stream_dev
  dev:
    mode: development
    default: true
    workspace:
      profile: atlas_stream_dev
    variables:
      schema: ${workspace.current_user.short_name}
      schedule_pause_status: PAUSED

  # -- Production ------------------------------------------------------------
  # Deploy path is pinned so only a single prod copy ever exists.
  # Profile: configure "atlas_stream" in ~/.databrickscfg, or let CI
  # env vars (DATABRICKS_HOST / DATABRICKS_TOKEN) take precedence.
  #   databricks configure --profile atlas_stream
  prod:
    mode: production
    workspace:
      profile: atlas_stream
      root_path: /Workspace/Users/dbbruijn@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      schema: prod
      schedule_pause_status: UNPAUSED
    permissions:
      - user_name: dbbruijn@gmail.com
        level: CAN_MANAGE
